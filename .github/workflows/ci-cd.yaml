name: Terraform Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      action:
        description: "Choose deploy or destroy"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: poll-app
  IMAGE_TAG: latest
  TERRAFORM_DIR: Poll

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init

      - name: Create terraform.auto.tfvars safely
        run: |
          cd ${{ env.TERRAFORM_DIR }}

          clean_value() {
            echo "$1" | tr -d '\r\n' | sed 's/"/\\"/g'
          }

          printf 'db_password = "%s"\n'            "$(clean_value "${{ secrets.DB_PASSWORD }}")" > terraform.auto.tfvars
          printf 'execution_role_arn = "%s"\n'     "$(clean_value "${{ secrets.EXECUTION_ROLE_ARN }}")" >> terraform.auto.tfvars
          printf 'task_role_arn = "%s"\n'          "$(clean_value "${{ secrets.TASK_ROLE_ARN }}")" >> terraform.auto.tfvars
          printf 'app_image = "%s"\n'              "$(clean_value "${{ env.IMAGE_URI }}")" >> terraform.auto.tfvars
          printf 'grafana_admin_password = "%s"\n' "$(clean_value "${{ secrets.GRAFANA_ADMIN_PASSWORD }}")" >> terraform.auto.tfvars
          printf 'grafana_image = "grafana/grafana:latest"\n' >> terraform.auto.tfvars
          printf 'ecs_cluster_id = "%s"\n'         "$(clean_value "${{ secrets.ECS_CLUSTER_ID }}")" >> terraform.auto.tfvars

          echo "✅ terraform.auto.tfvars created successfully."
          cat terraform.auto.tfvars

      - name: Terraform Plan
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform apply -auto-approve tfplan
