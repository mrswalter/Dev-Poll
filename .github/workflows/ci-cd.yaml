name: Terraform Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      action:
        description: "Choose deploy or destroy"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: poll-app
  IMAGE_TAG: latest
  TERRAFORM_DIR: Poll

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image to ECR
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init

      - name: Prepare Terraform Variables (sanitize secrets)
        run: |
          cd ${{ env.TERRAFORM_DIR }}

          clean_value() {
            echo "$1" | tr -d '\r' | tr -d '\n' | sed 's/"/\\"/g'
          }

          {
            echo "db_password            = \"$(clean_value "${{ secrets.DB_PASSWORD }}")\""
            echo "execution_role_arn     = \"$(clean_value "${{ secrets.EXECUTION_ROLE_ARN }}")\""
            echo "task_role_arn          = \"$(clean_value "${{ secrets.TASK_ROLE_ARN }}")\""
            echo "app_image              = \"$(clean_value "${{ env.IMAGE_URI }}")\""
            echo "grafana_admin_password = \"$(clean_value "${{ secrets.GRAFANA_ADMIN_PASSWORD }}")\""
            echo "grafana_image          = \"grafana/grafana:latest\""
            echo "ecs_cluster_id         = \"$(clean_value "${{ secrets.ECS_CLUSTER_ID }}")\""
          } > terraform.auto.tfvars

          echo "✅ terraform.auto.tfvars file created successfully."
          cat terraform.auto.tfvars

      - name: Terraform Plan
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform plan -out=tfplan

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TERRAFORM_DIR }}/tfplan

      - name: Terraform Apply
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform apply -auto-approve tfplan

  destroy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init

      - name: Prepare Terraform Variables (sanitize secrets)
        run: |
          cd ${{ env.TERRAFORM_DIR }}

          clean_value() {
            echo "$1" | tr -d '\r' | tr -d '\n' | sed 's/"/\\"/g'
          }

          {
            echo "db_password            = \"$(clean_value "${{ secrets.DB_PASSWORD }}")\""
            echo "execution_role_arn     = \"$(clean_value "${{ secrets.EXECUTION_ROLE_ARN }}")\""
            echo "task_role_arn          = \"$(clean_value "${{ secrets.TASK_ROLE_ARN }}")\""
            echo "grafana_admin_password = \"$(clean_value "${{ secrets.GRAFANA_ADMIN_PASSWORD }}")\""
            echo "grafana_image          = \"grafana/grafana:latest\""
            echo "ecs_cluster_id         = \"$(clean_value "${{ secrets.ECS_CLUSTER_ID }}")\""
          } > terraform.auto.tfvars

          echo "✅ terraform.auto.tfvars file created successfully."
          cat terraform.auto.tfvars

      - name: Terraform Destroy
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform destroy -auto-approve
